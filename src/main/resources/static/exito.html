<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! | El Arca Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo-arca.png" type="image/png">
    <link rel="stylesheet" href="mensajes.css">
    <script src="/global.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            localStorage.removeItem("carrito");
            localStorage.removeItem("precioEnvio");
            localStorage.removeItem("codigoPostal");
            localStorage.removeItem("metodoEnvio");
            localStorage.removeItem("nombreTransportista");
            localStorage.removeItem("costoEnvioCalculado");
        });
    </script>
</head>
<body>
    <header>
        <nav id="navbar" class="navbar">
            <a href="/" id="logo" class="logo-container">
                <img src="/images/logo-arca.png" alt="Logo El Arca Home" class="logo">
            </a>
        </nav>
    </header>

    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding: 20px;">
        <div class="mensaje-container">
            <div class="icono-exito">✔</div>
            <h1>¡Gracias por tu compra!</h1>
            <p>Tu pago ha sido procesado exitosamente. Nos pondremos en contacto con vos a la brevedad para coordinar la entrega de tus productos.</p>
            
            <a href="/" class="btn-volver">VOLVER A LA TIENDA</a>
        </div>
    </main>
</body>
</html>
