<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Compra Exitosa! | El Arca Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo-arca.png" type="image/png">
    <link rel="stylesheet" href="mensajes.css">
    <script src="/global.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const pedidoId = localStorage.getItem("ultimoPedidoId");
            const pedidoTotal = localStorage.getItem("ultimoPedidoTotal");
            const pedidoItemsStr = localStorage.getItem("ultimoPedidoItems");

            if (pedidoId && pedidoTotal && pedidoItemsStr) {
                document.getElementById("resumen-compra").style.display = "block";
                document.getElementById("nro-pedido").textContent = "#" + pedidoId;
                document.getElementById("total-abonado").textContent = parseFloat(pedidoTotal).toLocaleString("es-AR", {minimumFractionDigits: 2});
                
                try {
                    const items = JSON.parse(pedidoItemsStr);
                    const ul = document.getElementById("lista-productos");
                    items.forEach(item => {
                        const li = document.createElement("li");
                        li.textContent = `${item.cantidad}x ${item.nombre} - $${(item.cantidad * item.precio).toLocaleString("es-AR", {minimumFractionDigits: 2})}`;
                        ul.appendChild(li);
                    });
                } catch(e) {}
            }

            // Limpiamos todo el carrito y datos de sesión una vez mostrado
            localStorage.removeItem("carrito");
            localStorage.removeItem("precioEnvio");
            localStorage.removeItem("codigoPostal");
            localStorage.removeItem("metodoEnvio");
            localStorage.removeItem("nombreTransportista");
            localStorage.removeItem("costoEnvioCalculado");
            localStorage.removeItem("ultimoPedidoId");
            localStorage.removeItem("ultimoPedidoTotal");
            localStorage.removeItem("ultimoPedidoItems");
        });
    </script>
</head>
<body>
    <header>
        <nav id="navbar" class="navbar">
            <a href="/" id="logo" class="logo-container">
                <img src="/images/logo-arca.png" alt="Logo El Arca Home" class="logo">
            </a>
        </nav>
    </header>

    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding: 20px;">
        <div class="mensaje-container">
            <div class="icono-exito">✔</div>
            <h1>¡Gracias por tu compra!</h1>
            <p>Tu pago ha sido procesado exitosamente. Ya estamos preparando tu pedido.</p>

            <div id="resumen-compra" style="background-color: #f9f9f9; padding: 15px; border-radius: 8px; margin: 20px 0; text-align: left; display: none; color: #333;">
                <h3 style="margin-top: 0; color: #222;">Detalle de tu Pedido: <span id="nro-pedido"></span></h3>
                <ul id="lista-productos" style="padding-left: 20px; font-size: 14px;"></ul>
                <hr style="border: 0; border-top: 1px solid #ddd; margin: 10px 0;">
                <p style="font-weight: bold; text-align: right; margin: 0;">Total abonado: $<span id="total-abonado"></span></p>
            </div>
            
            <a href="/" class="btn-volver">VOLVER A LA TIENDA</a>
        </div>
    </main>
</body>
</html>
