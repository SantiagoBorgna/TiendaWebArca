<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error en el Pago | El Arca Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/images/logo-arca.png" type="image/png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="pago.css">
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
            text-align: center;
            background-color: #fafafa;
        }
        .mensaje-container {
            padding: 50px 40px;
            max-width: 550px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            width: 100%;
        }
        .icono-fallo {
            color: #d32f2f;
            font-size: 80px;
            margin-bottom: 25px;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        h1 { margin-bottom: 20px; color: #1a1a1a; font-weight: 700; font-family: 'Montserrat', sans-serif;}
        p { font-size: 1.1rem; color: #555; margin-bottom: 35px; line-height: 1.6;}
        .btn-reintentar {
            display: inline-block;
            background-color: #1a1a1a;
            color: white;
            padding: 16px 36px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .btn-reintentar:hover { 
            background-color: #333; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
    <header>
        <nav id="navbar" class="navbar">
            <a href="/" id="logo" class="logo-container">
                <img src="/images/logo-arca.png" alt="Logo El Arca Home" class="logo">
            </a>
        </nav>
    </header>

    <main style="flex:1; display:flex; align-items:center; justify-content:center; padding: 20px;">
        <div class="mensaje-container">
            <div class="icono-fallo">✕</div>
            <h1>Hubo un problema</h1>
            <p>No pudimos procesar tu pago a través de la pasarela. Puede que se haya rechazado la tarjeta, la sesión haya expirado o cancelaste la operación.</p>
            
            <a href="/pago" class="btn-reintentar">INTENTAR NUEVAMENTE</a>
        </div>
    </main>
</body>
</html>
